<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fotoğrafçı Simülatörü</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body>
<div id="game-wrapper">
  <canvas id="game-canvas"></canvas>
  <div id="ui-layer">
    <div id="ui-top">
      <div class="stat-box" id="stat-money">💰 <span id="money-display">0</span> ₺</div>
      <div class="stat-box" id="stat-day">📅 Gün <span id="day-display">1</span></div>
      <div class="stat-box" id="stat-time">⏰ <span id="time-display">09:00</span></div>
      <div class="stat-box" id="stat-cust">👥 <span id="cust-display">0</span> müşteri</div>
      <div class="stat-box" id="stat-lvl">⭐ Seviye <span id="lvl-display">1</span></div>
    </div>
    <div id="ui-bottom">
      <div id="task-panel">
        <div id="task-text">👋 Müşteriye yaklaşarak hizmete başla</div>
        <div id="task-progress"><div id="task-progress-fill"></div></div>
      </div>
      <div id="customer-info" class="hidden">
        <div id="ci-name"></div>
        <div id="ci-service"></div>
        <div id="ci-patience"><span id="ci-patience-text"></span><div id="ci-patience-bar"><div id="ci-patience-fill"></div></div></div>
        <div id="ci-fee"></div>
      </div>
    </div>
    <div id="panel-overlay" class="hidden">
      <div class="panel-box" id="service-panel">
        <h3>Hizmet Seçin</h3>
        <div id="service-list"></div>
      </div>
      <div class="panel-box hidden" id="sell-panel">
        <h3>Ne Satmak İstiyorsunuz?</h3>
        <div id="sell-list"></div>
      </div>
      <div class="panel-box hidden" id="day-report">
        <h3>📊 Gün Sonu Raporu</h3>
        <div id="report-content"></div>
        <button id="report-btn">Devam Et</button>
      </div>
    </div>
    <div id="flash"></div>
    <div id="dialog-box" class="hidden"><div class="speaker"></div><div class="text"></div></div>
    <div id="notif" class="hidden"></div>
    <div id="controls-hint"></div>
  </div>
</div>
<script src="js/config.js"></script>
<script src="js/renderer.js"></script>
<script src="js/player.js"></script>
<script src="js/customer.js"></script>
<script src="js/camera.js"></script>
<script src="js/economy.js"></script>
<script src="js/ui.js"></script>
<script src="js/interaction.js"></script>
<script src="js/main.js"></script>
</body>
</html>
